function calcEMA(data, period) {
  const k = 2 / (period + 1);
  const result = new Array(data.length).fill(null);
  let sum = 0;
  for (let i = 0; i < period && i < data.length; i++) sum += data[i];
  if (period <= data.length) result[period - 1] = sum / period;
  for (let i = period; i < data.length; i++)
    result[i] = (data[i] - result[i - 1]) * k + result[i - 1];

function setStrategy(type) {
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  cs.setMarkers([]);
  const area = document.getElementById('strategyArea');
  if (type === 'none') { area.style.display = 'none'; return; }
  area.style.display = 'block';

  const s = STRATEGIES[type];
  // Summary
  const sum = s.summary;
  document.getElementById('summaryBox').innerHTML =
    `<div class="summary-card"><div class="num" style="color:#ffd700">${sum.count}</div><div class="lbl">交易次数</div></div>` +
    `<div class="summary-card"><div class="num" style="color:${sum.win_rate>50?'#44ff44':'#ff4444'}">${sum.win_rate}%</div><div class="lbl">胜率</div></div>` +
    `<div class="summary-card"><div class="num" style="color:${sum.avg_profit>0?'#44ff44':'#ff4444'}">${sum.avg_profit}%</div><div class="lbl">平均盈亏</div></div>` +
    `<div class="summary-card"><div class="num" style="color:#44ff44">+${sum.max_profit}%</div><div class="lbl">最高盈</div></div>` +
    `<div class="summary-card"><div class="num" style="color:#ff4444">${sum.min_profit}%</div><div class="lbl">最低亏</div></div>`;

  // Table
  const tbody = document.getElementById('strategyTableBody');
  const showTrades = s.trades.slice(0, 200);
  tbody.innerHTML = showTrades.map((t, i) =>
    `<tr>
      <td>${i+1}</td>
      <td>${t.entry_date}</td>
      <td>${t.exit_date}</td>
      <td>${t.entry_price.toFixed(3)}</td>
      <td>${t.exit_price.toFixed(3)}</td>
      <td style="color:${t.profit>=0?'#44ff44':'#ff4444'};font-weight:bold">${t.profit>=0?'+':''}${t.profit.toFixed(2)}%</td>
      <td>${t.hold_days}</td>
      <td>${(t.max_profit||0).toFixed(1)}%</td>
    </tr>`
  ).join('');

  // Markers on chart
  const markers = [];
  showTrades.forEach(t => {
    const entryIdx = ALL_DATA.findIndex(d => d.date_str === t.entry_date);
    const exitIdx = ALL_DATA.findIndex(d => d.date_str === t.exit_date);
    if (entryIdx >= 0) markers.push({ time: ALL_DATA[entryIdx].t, position: 'aboveBar', color: t.profit>=0?'#44ff44':'#ff4444', shape: 'arrowUp', text: 'E' });
    if (exitIdx >= 0) markers.push({ time: ALL_DATA[exitIdx].t, position: 'belowBar', color: '#ff9900', shape: 'arrowDown', text: 'X' });
  });
  cs.setMarkers(markers);
}

chart.timeScale().fitContent();
