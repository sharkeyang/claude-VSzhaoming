<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; color:#eee; font-family:'Microsoft YaHei',sans-serif; padding:10px; }
.chart-container { background:#16213e; border-radius:8px; padding:10px; margin-bottom:8px; }
#kline-chart { width:100%; height:420px; }
#timeline-chart { width:100%; height:50px; }
.profile { display:flex; gap:6px; flex-wrap:wrap; padding:8px; background:#16213e; border-radius:8px; font-size:12px; }
.profile-item { background:#0f3460; padding:4px 10px; border-radius:4px; }
.profile-item .label { color:#888; }
.profile-item .value { color:#fff; font-weight:bold; }
.controls { display:flex; gap:8px; margin:8px 0; flex-wrap:wrap; align-items:center; }
.controls button { background:#0f3460; color:#eee; border:1px solid #333; padding:6px 16px; border-radius:4px; cursor:pointer; font-size:13px; }
.controls button:hover { background:#1a4a80; }
.controls button.active { background:#e94560; border-color:#e94560; }
.controls .rp { background:#2d6a4f; border-color:#40916c; }
.controls .rp:hover { background:#40916c; }
.controls .rp.on { background:#e94560; border-color:#e94560; }
.replay-bar { display:flex; gap:8px; align-items:center; padding:6px; background:#0f3460; border-radius:6px; margin:6px 0; flex-wrap:wrap; }
.replay-bar .pos { color:#ffd700; font-size:14px; font-weight:bold; min-width:100px; }
.replay-bar input[type=range] { width:200px; accent-color:#e94560; }
.replay-bar select { background:#1a1a2e; color:#eee; border:1px solid #333; padding:3px 6px; border-radius:3px; }
.summary { display:flex; gap:10px; flex-wrap:wrap; margin:6px 0; }
.summary-card { background:#0f3460; padding:6px 12px; border-radius:6px; text-align:center; min-width:80px; }
.summary-card .num { font-size:18px; font-weight:bold; }
.summary-card .lbl { font-size:10px; color:#888; }
.strategy-panel { background:#16213e; border-radius:8px; padding:10px; margin-top:8px; max-height:250px; overflow-y:auto; }
.strategy-panel table { width:100%; border-collapse:collapse; font-size:11px; }
.strategy-panel th { background:#0f3460; padding:4px 6px; border:1px solid #333; position:sticky; top:0; }
.strategy-panel td { padding:3px 6px; border:1px solid #333; text-align:center; }
.dje-badge { display:inline-block; background:#333; color:#888; padding:1px 6px; border-radius:3px; font-size:10px; margin-left:4px; }
</style>
</head>
<body>

<div class="controls">
  <button class="active" onclick="setStrategy('none')">仅K线</button>
  <button onclick="setStrategy('long')">长多<span class="dje-badge">DJE</span></button>
  <button onclick="setStrategy('nextWeek')">下周冲高<span class="dje-badge">DJE</span></button>
  <button onclick="setStrategy('nextDay')">下日冲高<span class="dje-badge">DJE</span></button>
  <span style="color:#888;font-size:12px;margin-left:auto;">📍 <span id="currentDate">-</span></span>
</div>

<div class="replay-bar">

  <span class="pos"><span id="replayIdx">0</span> / 3727</span>
  <input type="range" id="replaySlider" min="0" max="3726" value="0" oninput="jumpTo(+this.value)">
  <select id="replaySpeed">
    <option value="50">20x</option>
    <option value="100">10x</option>
    <option value="200">5x</option>
    <option value="500" selected>2x</option>
    <option value="1000">1x</option>
    <option value="2000">0.5x</option>

  </select>
  <span style="color:#888;font-size:11px;"><span id="replayDate">-</span></span>
</div>

<div class="chart-container">
  <div id="kline-chart"></div>
</div>

<div class="chart-container">
  <div id="timeline-chart"></div>
</div>

  <div class="profile-item"><span class="label">周涨</span> <span class="value" id="p_chg_w">-</span></div>
  <div class="profile-item"><span class="label">日周联动</span> <span class="value" id="p_zone">-</span></div>
  <div class="profile-item"><span class="label">护型DXAB</span> <span class="value" id="p_hx">-</span></div>
  <div class="profile-item"><span class="label">猪操作</span> <span class="value" id="p_pig">-</span></div>
  <div class="profile-item"><span class="label">OHLC</span> <span class="value" id="p_ohlc">-</span></div>

  </div>
</div>

const TOTAL = ALL.length;
const closes = ALL.map(d=>d.c);

function ema(d,p){const k=2/(p+1),r=new Array(d.length).fill(null);let s=0;for(let i=0;i<p&&i<d.length;i++)s+=d[i];if(p<=d.length)r[p-1]=s/p;for(let i=p;i<d.length;i++)r[i]=(d[i]-r[i-1])*k+r[i-1];return r}
const e5=ema(closes,5),e10=ema(closes,10),e26=ema(closes,26),e55=ema(closes,55),e120=ema(closes,120);

let idx=0,timer=null,playing=false;

function upd(n){
  const d=ALL[n],i=n+1;
  document.getElementById('currentDate').textContent=d.date_str;
  document.getElementById('replayDate').textContent=d.date_str;
  document.getElementById('replayIdx').textContent=i;
  document.getElementById('p_chg_d').textContent=d.chg_d.toFixed(2)+'%';

  document.getElementById('p_dje').textContent=e120[n]!==null?e120[n].toFixed(3):'-';

function bars(n){
  if(n<1){idx=0;n=1}
  const sub=ALL.slice(0,n);
  cs.setData(sub.map(d=>({time:d.t,open:d.o,high:d.h,low:d.l,close:d.c})));
  const ld=(arr)=>arr.slice(0,n).map((v,i)=>v!==null?{time:ALL[i].t,value:v}:null).filter(x=>x);
  [l5,l10,l26,l55].forEach((s,i)=>s.setData(ld([e5,e10,e26,e55][i])));
  dje.setData(ld(e120));
  upd(n-1);
  chart.timeScale().fitContent();
}

function setStrategy(t){
  document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  cs.setMarkers([]);
  const a=document.getElementById('strategyArea');
  if(t==='none'){a.style.display='none';return}
  a.style.display='block';
  const s=S[t],v=s.s;
  document.getElementById('summaryBox').innerHTML=
    '<div class="summary-card"><div class="num" style="color:#ffd700">'+v.count+'</div><div class="lbl">交易次数</div></div>'+
    '<div class="summary-card"><div class="num" style="color:'+(v.win_rate>50?'#44ff44':'#ff4444')+'">'+v.win_rate+'%</div><div class="lbl">胜率</div></div>'+

  ).join('');
  const m=[];
  s.trades.forEach(t=>{
    const ei=ALL.findIndex(d=>d.date_str===t.entry_date),xi=ALL.findIndex(d=>d.date_str===t.exit_date);
    if(ei>=0)m.push({time:ALL[ei].t,position:'aboveBar',color:t.profit>=0?'#44ff44':'#ff4444',shape:'arrowUp',text:'E'});

  });

}
